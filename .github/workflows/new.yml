name: Greetings

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

jobs:
  greetings:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Hey thanks for opening your first issue!!
            I'll make sure to take a look soon, please make surethat you have included:
              - Steps to reproduce
              - Expected vs Actual behavior
          pr-message: |
            Thanks for your first PR! I'll review it shortly.


  label-issue:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'issues' }}
    permissions:
      issues: write
    steps:
      - name: Add triage label
        uses: actions/github-script@v6
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['needs-triage']
            })

  notify:
    needs: [greetings, label-issue]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Log result
        run: |
          echo "Greeting status: ${{ needs.greetings.result }}"
          echo "Label status: ${{ needs.label-issue.result }}"
