name: Greetings2
on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]
jobs:
  greetings:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Greet first-time contributor
        uses: actions/github-script@v7
        with:
          script: |
            const event = context.eventName;
            const number = event === 'issues'
              ? context.issue.number
              : context.payload.pull_request.number;

            const msg = event === 'issues'
              ? 'Hey, thanks for opening an issue! I will take a look soon.'
              : 'Thanks for the PR! I will review it shortly.';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: number,
              body: msg
            });

  label-issue:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'issues' }}
    permissions:
      issues: write
    steps:
      - name: Add triage label
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['needs-triage']
            })

  notify:
    needs: [greetings, label-issue]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Log result
        run: |
          echo "Greeting status: ${{ needs.greetings.result }}"
          echo "Label status: ${{ needs.label-issue.result }}"
